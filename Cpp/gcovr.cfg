# Run from repository root after building with -DENABLE_COVERAGE=ON and executing unit_tests.
root = online-shopping-system/Server/Headers
object-directory = build/CMakeFiles/shopping_obj_test.dir
filter = online-shopping-system/Server/Headers/(Admin|Cash|Complaint_|Customer|Employee|Person|Thread)\.cpp
exclude = .*test.*
exclude = .*_deps.*
txt-metric = line
html-details = build/coverage_report.html
txt = build/coverage_summary.txt
fail-under-line = 90
